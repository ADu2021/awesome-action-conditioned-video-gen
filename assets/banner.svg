<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Awesome Action-Conditioned Video Generation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#141a33"/>
      <stop offset="1" stop-color="#1d1140"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ee7f9"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- film-strip frames: each frame = one generated step, arrows = actions between frames -->
  <g transform="translate(70,196)" opacity="0.96">
    <g stroke="url(#accent)" stroke-width="2.5" fill="none">
      <rect x="0"   y="0" width="70" height="50" rx="6"/>
      <rect x="150" y="0" width="70" height="50" rx="6"/>
      <rect x="300" y="0" width="70" height="50" rx="6"/>
      <rect x="450" y="0" width="70" height="50" rx="6"/>
      <rect x="600" y="0" width="70" height="50" rx="6"/>
      <rect x="750" y="0" width="70" height="50" rx="6"/>
    </g>
    <!-- tiny content hints inside frames -->
    <g fill="#6ee7f9" opacity="0.55">
      <circle cx="20"  cy="34" r="5"/><circle cx="170" cy="30" r="5"/><circle cx="320" cy="26" r="5"/>
      <circle cx="470" cy="22" r="5"/><circle cx="620" cy="18" r="5"/><circle cx="770" cy="16" r="5"/>
    </g>
    <!-- action arrows between frames -->
    <g stroke="#f472b6" stroke-width="3" fill="#f472b6" filter="url(#glow)">
      <line x1="76" y1="25" x2="142" y2="25"/><polygon points="142,19 152,25 142,31"/>
      <line x1="226" y1="25" x2="292" y2="25"/><polygon points="292,19 302,25 292,31"/>
      <line x1="376" y1="25" x2="442" y2="25"/><polygon points="442,19 452,25 442,31"/>
      <line x1="526" y1="25" x2="592" y2="25"/><polygon points="592,19 602,25 592,31"/>
      <line x1="676" y1="25" x2="742" y2="25"/><polygon points="742,19 752,25 742,31"/>
    </g>
    <g fill="#cbd5e1" font-family="monospace" font-size="12" text-anchor="middle" opacity="0.8">
      <text x="113" y="74">aₜ</text><text x="263" y="74">aₜ₊₁</text><text x="413" y="74">aₜ₊₂</text>
      <text x="563" y="74">aₜ₊₃</text><text x="713" y="74">aₜ₊₄</text>
    </g>
  </g>

  <!-- title -->
  <text x="70" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">Awesome <tspan fill="url(#accent)">Action-Conditioned</tspan></text>
  <text x="70" y="146" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">Video Generation</text>
  <text x="72" y="176" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#9fb3c8">Controllable world models &amp; video prediction · Robotics · Games · Driving</text>

  <!-- controller / action glyph top-right -->
  <g transform="translate(1010,54)" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9">
    <rect x="0" y="0" width="120" height="64" rx="26"/>
    <line x1="30" y1="22" x2="30" y2="44"/><line x1="19" y1="33" x2="41" y2="33"/>
    <circle cx="92" cy="26" r="6"/><circle cx="104" cy="42" r="6"/>
  </g>
</svg>
